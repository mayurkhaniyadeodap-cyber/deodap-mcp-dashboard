# Alembic config. Phase 1 ships ONE migration for schema structure; it is not
# run against any database. The URL is a placeholder (overridden by env.py from
# app settings if ever executed in Phase 2).
[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./deodap.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
